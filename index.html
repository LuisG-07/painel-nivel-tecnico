<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillMatrix Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
<div class="topbar">
  <div class="logo-area">
    <i class="ti ti-chart-bar" style="color:var(--blue);font-size:20px" aria-hidden="true"></i>
    <div class="logo-text">Skill<span>Matrix</span> Pro</div>
  </div>
  <button class="nav-tab active" onclick="App.switchPage('visao',this)" aria-label="Visão Geral">Visão Geral</button>
  <button class="nav-tab" onclick="App.switchPage('evolucao',this)" aria-label="Evolução">Evolução</button>
  <button class="nav-tab" onclick="App.switchPage('treinamento',this)" aria-label="Treinamento">Treinamento</button>
  <div class="sep" aria-hidden="true"></div>
  <div id="sectorTabsContainer" style="display:contents"></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 12px;border-left:1px solid var(--border)">
    <span id="zdBadge" title="" style="display:none;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.05)" onclick="App.openManageModal()" aria-label="Status Zendesk">
      <span class="zd-dot" style="width:7px;height:7px;border-radius:50%;display:inline-block;background:#888"></span>
      <span class="zd-label">Zendesk</span>
    </span>
    <button onclick="App.exportHTML()" style="background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap" aria-label="Exportar HTML">
      <i class="ti ti-download" aria-hidden="true"></i> Exportar HTML
    </button>
  </div>
</div>

<div class="container">
  <div id="page-visao"       class="page active"></div>
  <div id="page-evolucao"    class="page"></div>
  <div id="page-treinamento" class="page"></div>
</div>

<script src="js/domain.js"></script>
<script src="js/store/storage.js"></script>
<script src="js/ui/overview.js"></script>
<script src="js/ui/evolution.js"></script>
<script src="js/ui/training.js"></script>
<script src="js/ui/modals.js"></script>
<script src="js/integrations/zendesk_sync.js"></script>
<script src="js/main.js"></script>
</body>
</html>
